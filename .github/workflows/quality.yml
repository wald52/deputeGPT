name: Quality Gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build bundled app
        run: npm run build:app

      - name: Run Playwright checks
        run: npm run test:playwright

      - name: Run router regression
        run: npm run test:router

      - name: Start local server
        run: |
          python serve_local.py > /tmp/deputegpt-serve.log 2>&1 &
          echo $! > /tmp/deputegpt-serve.pid
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/deputegpt-serve.log || true
          exit 1

      - name: Run Lighthouse budget
        run: npm run test:lighthouse

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          if-no-files-found: ignore
          path: |
            test-results
            tmp-lighthouse-ci.json

      - name: Stop local server
        if: always()
        run: |
          if [ -f /tmp/deputegpt-serve.pid ]; then
            kill "$(cat /tmp/deputegpt-serve.pid)" || true
          fi

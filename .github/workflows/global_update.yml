name: Global Update (Deputes + Votes)

on:
  schedule:
    # On lance tout à 4h00 du matin
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      remote_max_calls:
        description: "Budget d'appels API pour l'index d'embeddings distant (backfill manuel : monter à ~90)"
        required: false
        default: "40"

permissions:
  contents: write
  issues: write

# Evite que deux mises a jour (cron + declenchement manuel) tournent en meme temps
# et se marchent dessus lors du commit/push.
concurrency:
  group: global-update
  cancel-in-progress: false

env:
  # Silence l'avertissement de deprecation du runtime Node 20 des actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  update-all:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Cache du modele d'embeddings HuggingFace (multilingual-e5-small + BGE-M3).
      # Evite un retelechargement quotidien : reduit fortement le risque d'echec
      # reseau (cf. incident du 5 juin) et accelere le job.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-models-

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          npm ci

      # --- ETAPE 1 : DEPUTES ---
      - name: Update Deputes Data
        run: |
          echo "Mise à jour de la liste des députés..."
          python -u scripts/update_deputes_actifs.py

      # --- ETAPE 2 : VOTES ---
      - name: Download & Update Votes Data
        run: |
          echo "Téléchargement des votes..."
          mkdir -p Scrutins
          wget -q --tries=3 --timeout=60 --retry-connrefused \
            -O Scrutins.json.zip \
            "https://data.assemblee-nationale.fr/static/openData/repository/17/loi/scrutins/Scrutins.json.zip"

          # Verifie l'integrite de l'archive avant traitement (echec clair si tronquee/corrompue)
          unzip -tq Scrutins.json.zip
          unzip -q Scrutins.json.zip -d Scrutins

          echo "Traitement des votes..."
          python scripts/process_votes.py

      # --- ETAPE 2.5 : HEMICYCLE (SVG + PLACES) ---
      - name: Update Hemicycle Graphics & Data
        run: |
          echo "Mise à jour graphique de l'hémicycle..."

          # 1. Récupérer le plan SVG (Remplace le fichier à la racine)
          python scripts/update_hemicycle_svg.py

          # 2. Récupérer le mapping Places <-> Députés (Génère public/data/places_mapping.json)
          python scripts/scrap_places.py
          
          # Vérifications
          ls -l public/data/hemicycle_svg/hemicycle.svg || echo "⚠️ SVG non généré"
          ls -l public/data/place_mapping/places_mapping.json || echo "⚠️ Mapping non généré"
        
      # --- ETAPE 2.75 : UPDATE GROUP COLORS ---
      - name: Update Group Colors
        run: |
          echo "Mise à jour des couleurs des groupes..."
          python scripts/update_group_colors.py
          ls -l public/data/deputes_actifs/groupes.json || echo "⚠️ Fichier des groupes non mis à jour"

      # --- ETAPE 2.9 : GÉNÉRATION ARTEFACTS RAG ---
      - name: Generate RAG Artifacts
        env:
          # Index d'embeddings distant (Nemotron) : optionnel. Sans le secret,
          # la génération distante est sautée proprement et l'artefact précédent
          # est conservé — aucune dépendance au service gratuit.
          # Utiliser une clé DISTINCTE de celle du Worker Cloudflare pour ne pas
          # partager le quota quotidien du tier gratuit OpenRouter.
          EMBEDDING_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EMBEDDING_API_BASE_URL: ${{ vars.EMBEDDING_API_BASE_URL }}
          EMBEDDING_API_MODEL: ${{ vars.EMBEDDING_API_MODEL }}
        run: |
          echo "🧠 Génération des artefacts RAG..."

          # Génération des index lexicaux + sémantiques
          python scripts/generate_semantic_index.py \
            --remote-max-calls "${{ github.event.inputs.remote_max_calls || '40' }}"

          # Vérifications des artefacts publics et du manifest RAG.
          # L'index lexical et le manifest sont toujours régénérés localement :
          # leur absence est une vraie erreur (exit 1). Les index sémantiques
          # peuvent être conservés de la veille en cas d'indispo HuggingFace :
          # on se contente d'un avertissement (dégradation gracieuse).
          if [ -f "public/data/rag/lexical_index.json" ]; then
            SIZE=$(du -h public/data/rag/lexical_index.json | cut -f1)
            echo "✅ Index lexical RAG généré: $SIZE"
          else
            echo "⚠️ Index lexical RAG non généré"
            exit 1
          fi

          if [ -f "public/data/rag/semantic_index.json" ]; then
            SIZE=$(du -h public/data/rag/semantic_index.json | cut -f1)
            echo "✅ Index sémantique RAG présent: $SIZE"
          else
            echo "⚠️ Index sémantique RAG absent (dégradation gracieuse, non bloquant)"
          fi

          if [ -f "public/data/rag/semantic_multivector_index.json" ]; then
            SIZE=$(du -h public/data/rag/semantic_multivector_index.json | cut -f1)
            echo "✅ Index sémantique multi-vector présent: $SIZE"
          else
            echo "⚠️ Index sémantique multi-vector absent (dégradation gracieuse, non bloquant)"
          fi

          if [ -f "public/data/rag/semantic_index_remote.json" ]; then
            SIZE=$(du -h public/data/rag/semantic_index_remote.json | cut -f1)
            echo "✅ Index sémantique distant présent: $SIZE"
          else
            echo "ℹ️ Index sémantique distant absent (optionnel, non bloquant)"
          fi

          if [ -f "public/data/rag/manifest.json" ]; then
            echo "✅ Manifest RAG généré"
          else
            echo "⚠️ Manifest RAG non généré"
            exit 1
          fi

      - name: Build bundled app
        run: |
          echo "📦 Construction du bundle front..."
          npm run build:app

      # --- ETAPE 3 : COMMIT UNIQUE ---
      - name: Commit & Push Changes (Main)
        id: commit_main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # On ajoute les donnees publiees et tous les artefacts modifies par le build
          git add public/data pwa-assets.json sw.js
          git add -f js/dist

          # Vérification s'il y a des changements réels
          if git diff --cached --quiet; then
            echo "Aucun changement détecté sur les données."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changements détectés, commit en cours..."
            # Un seul commit pour tout !
            git commit -m "data: daily update (deputes + votes)"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # --- ETAPE 4 : KEEPALIVE (Seulement si rien n'a changé) ---
      - name: Keepalive (si aucun changement data)
        if: steps.commit_main.outputs.changed == 'false'
        run: |
          set -euo pipefail
          KEEPALIVE_BRANCH="keepalive"
          
          echo "Aucune donnée n'a changé aujourd'hui. Lancement du keepalive sur la branche $KEEPALIVE_BRANCH."
          
          git fetch origin "$KEEPALIVE_BRANCH":"$KEEPALIVE_BRANCH" || true
          git checkout "$KEEPALIVE_BRANCH" || git checkout -b "$KEEPALIVE_BRANCH"
          git reset --hard
          git clean -fd

          mkdir -p .github
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .github/keepalive.txt

          git add .github/keepalive.txt
          git commit -m "chore: keepalive"
          git push -u origin "$KEEPALIVE_BRANCH"

      # --- ETAPE 5 : ALERTE EN CAS D'ECHEC ---
      # Ouvre (ou rafraichit) une UNIQUE issue de suivi quand la mise a jour echoue,
      # au lieu de noyer la boite mail sous une alerte GitHub par jour. L'issue est
      # auto-deduppliquee via le label "ci-failure" : un commentaire est ajoute si
      # elle existe deja. A refermer manuellement une fois le probleme resolu.
      - name: Signaler l'echec (issue de suivi)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'ci-failure';
            const title = '⚠️ Mise à jour quotidienne (Global Update) en échec';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `La mise à jour automatique a échoué le ${new Date().toISOString()}.\n\n` +
              `👉 Logs du run : ${runUrl}\n\n` +
              `Cette issue se referme manuellement une fois le problème résolu.`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }
